<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chet Mutaphon — Creative Portfolio</title>
  <meta name="description" content="Chet Mutaphon — Creative Director & Visual Storyteller. Luxury hospitality photography, brand campaigns, and editorial design from Phuket, Thailand." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" />

  <style>
    /* ─── Chet Mutaphon Portfolio — Ultra Minimal Luxury ─── */

    :root {
      --bg-deepest: #0a0908;
      --bg-dark: #111010;
      --bg-card: #161514;
      --bg-elevated: #1c1a19;
      --bg-hover: #242220;
      --text-primary: #e4ddd0;
      --text-secondary: #8a8078;
      --text-muted: #524b44;
      --accent: #b89b71;
      --accent-dim: #8a7a60;
      --border: #1f1d1b;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'DM Sans', 'Helvetica Neue', Helvetica, sans-serif;
      --font-display-alt: 'Cormorant Garamond', Georgia, serif;
      --page-pad: clamp(28px, 6vw, 120px);
      --gap-section: clamp(120px, 16vh, 240px);
      --grid-gap: 4px;
      --masonry-cols: 4;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-deepest);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
      font-weight: 300;
    }

    img { display: block; max-width: 100%; height: auto; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }

    .scroll-progress { display: none; }

    /* ─── Navigation ─── */
    .nav-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 900;
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px var(--page-pad);
      transition: background 0.6s, backdrop-filter 0.6s;
    }
    .nav-bar.scrolled {
      background: rgba(10, 9, 8, 0.85);
      backdrop-filter: blur(30px) saturate(1.2);
    }
    .nav-logo {
      font-family: var(--font-body);
      font-size: 0.72rem; font-weight: 400;
      letter-spacing: 0.35em; text-transform: uppercase;
      color: var(--text-secondary);
    }
    .nav-burger {
      width: 32px; height: 20px;
      display: flex; flex-direction: column; justify-content: space-between;
      padding: 0;
    }
    .nav-burger span {
      display: block; width: 100%; height: 1px;
      background: var(--text-secondary);
      transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.4s;
    }
    .nav-burger.open span:nth-child(1) { transform: translateY(9.5px) rotate(45deg); }
    .nav-burger.open span:nth-child(2) { opacity: 0; }
    .nav-burger.open span:nth-child(3) { transform: translateY(-9.5px) rotate(-45deg); }

    /* ─── Overlay Menu ─── */
    .menu-overlay {
      position: fixed; inset: 0; z-index: 800;
      background: var(--bg-deepest);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .menu-overlay.open { opacity: 1; pointer-events: all; }
    .menu-overlay nav {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .menu-link {
      font-family: var(--font-display);
      font-size: clamp(1.3rem, 2.8vw, 2.2rem);
      font-weight: 400; letter-spacing: 0.03em;
      color: var(--text-muted);
      padding: 8px 0;
      transition: color 0.4s, transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      transform: translateY(16px); opacity: 0;
    }
    .menu-overlay.open .menu-link { transform: translateY(0); opacity: 1; }
    .menu-link:hover, .menu-link.active { color: var(--text-primary); }
    .menu-overlay.open .menu-link:nth-child(1) { transition-delay: 0.05s; }
    .menu-overlay.open .menu-link:nth-child(2) { transition-delay: 0.08s; }
    .menu-overlay.open .menu-link:nth-child(3) { transition-delay: 0.11s; }
    .menu-overlay.open .menu-link:nth-child(4) { transition-delay: 0.14s; }
    .menu-overlay.open .menu-link:nth-child(5) { transition-delay: 0.17s; }
    .menu-overlay.open .menu-link:nth-child(6) { transition-delay: 0.20s; }
    .menu-overlay.open .menu-link:nth-child(7) { transition-delay: 0.23s; }
    .menu-overlay.open .menu-link:nth-child(8) { transition-delay: 0.26s; }
    .menu-overlay.open .menu-link:nth-child(9) { transition-delay: 0.29s; }
    .menu-overlay.open .menu-link:nth-child(10) { transition-delay: 0.32s; }
    .menu-overlay.open .menu-link:nth-child(11) { transition-delay: 0.35s; }

    /* ─── Hero ─── */
    .hero {
      position: relative; height: 100vh; min-height: 600px;
      display: flex; align-items: flex-end; justify-content: flex-start;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      animation: heroZoom 25s ease-in-out infinite alternate;
    }
    @keyframes heroZoom {
      0% { transform: scale(1); }
      100% { transform: scale(1.06); }
    }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        to top,
        rgba(10, 9, 8, 0.92) 0%,
        rgba(10, 9, 8, 0.35) 50%,
        rgba(10, 9, 8, 0.15) 100%
      );
    }
    .hero-content {
      position: relative; z-index: 2;
      padding: 0 var(--page-pad) clamp(80px, 12vh, 160px);
    }
    .hero-label {
      font-family: var(--font-body);
      font-size: 0.65rem; font-weight: 400;
      letter-spacing: 0.4em; text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 24px;
      animation: fadeUp 1.2s ease 0.4s both;
    }
    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(2.8rem, 6.5vw, 6rem);
      font-weight: 400; line-height: 1.05;
      letter-spacing: -0.01em;
      color: var(--text-primary);
      animation: fadeUp 1.2s ease 0.6s both;
    }
    .hero-subtitle {
      font-size: clamp(0.85rem, 1.1vw, 1rem);
      color: var(--text-muted);
      max-width: 440px; line-height: 1.8;
      margin-top: 28px; font-weight: 300;
      animation: fadeUp 1.2s ease 0.9s both;
    }
    .hero-scroll {
      position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
      z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .hero-scroll-line {
      width: 1px; height: 48px; background: var(--text-muted); opacity: 0.3;
      animation: scrollPulse 2.5s ease-in-out infinite;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scrollPulse {
      0%, 100% { opacity: 0.15; transform: scaleY(0.4); }
      50% { opacity: 0.4; transform: scaleY(1); }
    }

    /* ─── Section Headers ─── */
    .section { padding: var(--gap-section) var(--page-pad); }
    .section-header { margin-bottom: clamp(48px, 6vh, 88px); }
    .section-title {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 3.5vw, 3rem);
      font-weight: 400; line-height: 1.15;
      letter-spacing: 0.01em;
    }

    /* ─── About ─── */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: clamp(60px, 8vw, 140px);
      align-items: start;
    }
    .about-portrait {
      aspect-ratio: 3/4;
      background: var(--bg-card);
      overflow: hidden;
    }
    .about-portrait img { width: 100%; height: 100%; object-fit: cover; }
    .about-bio {
      font-size: 0.95rem;
      line-height: 2; color: var(--text-secondary);
      margin-bottom: 48px; font-weight: 300;
    }
    .about-exp { margin-bottom: 56px; }
    .about-exp-item {
      padding: 28px 0;
      border-bottom: 1px solid var(--border);
    }
    .about-exp-role {
      font-family: var(--font-display);
      font-size: 1.1rem; font-weight: 400;
      margin-bottom: 4px;
    }
    .about-exp-company {
      color: var(--text-muted); font-size: 0.8rem;
      letter-spacing: 0.08em; font-weight: 400;
    }
    .about-exp-period {
      font-size: 0.7rem; color: var(--text-muted); margin: 8px 0;
      letter-spacing: 0.15em; font-weight: 300; opacity: 0.6;
    }
    .about-skills { display: flex; flex-wrap: wrap; gap: 16px; }
    .skill-tag {
      font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text-muted); font-weight: 300; padding: 0; border: none;
      transition: color 0.4s;
    }
    .skill-tag:hover { color: var(--text-secondary); }

    /* ─── Selected Works ─── */
    .works-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--grid-gap);
    }
    .work-card {
      position: relative; overflow: hidden; cursor: pointer;
      aspect-ratio: 4/3; background: var(--bg-card);
    }
    .work-card img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 1.2s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.6s;
    }
    .work-card:hover img { transform: scale(1.03); opacity: 0.85; }
    .work-card-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: clamp(20px, 2.5vw, 36px);
      background: linear-gradient(to top, rgba(10, 9, 8, 0.7) 0%, transparent 100%);
      opacity: 0; transition: opacity 0.5s;
    }
    .work-card:hover .work-card-overlay { opacity: 1; }
    .work-card-cat {
      font-size: 0.58rem; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 6px; font-weight: 400;
    }
    .work-card-title {
      font-family: var(--font-display);
      font-size: clamp(0.9rem, 1.2vw, 1.15rem); font-weight: 400;
    }

    /* ─── Photo Masonry ─── */
    .photo-filters {
      display: flex; gap: 24px; margin-bottom: 40px; flex-wrap: wrap;
    }
    .filter-btn {
      padding: 0; font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase;
      border: none; color: var(--text-muted); font-weight: 300;
      transition: color 0.4s; background: none;
    }
    .filter-btn:hover, .filter-btn.active { color: var(--text-primary); }
    .masonry-grid {
      column-count: var(--masonry-cols);
      column-gap: var(--grid-gap);
    }
    .masonry-item {
      break-inside: avoid; margin-bottom: var(--grid-gap);
      position: relative; overflow: hidden;
      cursor: pointer; background: var(--bg-card);
    }
    .masonry-item img {
      width: 100%; display: block;
      aspect-ratio: 3/4; object-fit: cover;
      transition: transform 1s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.5s;
    }
    .masonry-item:hover img { transform: scale(1.02); opacity: 0.9; }
    .masonry-item-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: flex-end; padding: 14px;
      opacity: 0; transition: opacity 0.5s;
      background: linear-gradient(to top, rgba(10,9,8,0.5) 0%, transparent 40%);
    }
    .masonry-item:hover .masonry-item-overlay { opacity: 1; }
    .masonry-item-title { font-size: 0.7rem; font-weight: 300; letter-spacing: 0.05em; }

    /* ─── Video Grid ─── */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: var(--grid-gap);
    }
    .video-card {
      position: relative; overflow: hidden; cursor: pointer;
      background: var(--bg-card);
    }
    .video-card-inner {
      width: 100%; aspect-ratio: 9/16; position: relative;
      overflow: hidden; background: #0a0908;
    }
    .video-card-inner iframe {
      position: absolute; top: 50%; left: 50%;
      width: 100%; height: 100%;
      transform: translate(-50%, -50%);
      border: none; pointer-events: none;
    }
    .video-card-inner img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 1s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.5s;
    }
    .video-card:hover .video-card-inner img { transform: scale(1.02); opacity: 0.85; }
    .video-play-icon {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 48px; height: 48px;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.4s;
      z-index: 2;
    }
    .video-card:hover .video-play-icon { opacity: 1; }
    .video-play-icon::after {
      content: ''; display: block;
      width: 0; height: 0;
      border-left: 11px solid rgba(255,255,255,0.7);
      border-top: 7px solid transparent;
      border-bottom: 7px solid transparent;
      margin-left: 3px;
    }
    .video-card-info {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 14px;
      background: linear-gradient(to top, rgba(10,9,8,0.6), transparent);
      opacity: 0; transition: opacity 0.5s; z-index: 2;
    }
    .video-card:hover .video-card-info { opacity: 1; }
    .video-card-title { font-size: 0.72rem; font-weight: 300; }
    .video-card-cat {
      font-size: 0.58rem; color: var(--text-muted);
      letter-spacing: 0.15em; text-transform: uppercase;
      margin-top: 3px; font-weight: 300;
    }

    /* ─── F&B Poster Wall ─── */
    .fnb-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: minmax(200px, auto);
      gap: var(--grid-gap);
    }
    .fnb-card {
      position: relative; overflow: hidden; cursor: pointer;
      background: var(--bg-card);
    }
    .fnb-card.large { grid-column: span 2; grid-row: span 2; }
    .fnb-card img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 1s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.5s;
    }
    .fnb-card:hover img { transform: scale(1.02); opacity: 0.85; }
    .fnb-card-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: clamp(12px, 1.5vw, 20px);
      background: linear-gradient(to top, rgba(10,9,8,0.6) 0%, transparent 100%);
      opacity: 0; transition: opacity 0.5s;
    }
    .fnb-card:hover .fnb-card-overlay { opacity: 1; }
    .fnb-card-cat {
      font-size: 0.55rem; color: var(--text-muted);
      letter-spacing: 0.2em; text-transform: uppercase;
      margin-bottom: 4px; font-weight: 300;
    }
    .fnb-card-title {
      font-family: var(--font-display);
      font-size: clamp(0.78rem, 1vw, 1rem); font-weight: 400;
    }

    /* ─── Sales Grid ─── */
    .sales-featured {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: var(--grid-gap); margin-bottom: var(--grid-gap);
    }
    .sales-card {
      position: relative; overflow: hidden; cursor: pointer;
      background: var(--bg-card); aspect-ratio: 4/3;
    }
    .sales-card.hero-card { aspect-ratio: 16/9; }
    .sales-card img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 1s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.5s;
    }
    .sales-card:hover img { transform: scale(1.02); opacity: 0.85; }
    .sales-card-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: clamp(16px, 2vw, 28px);
      background: linear-gradient(to top, rgba(10,9,8,0.6), transparent);
      opacity: 0; transition: opacity 0.5s;
    }
    .sales-card:hover .sales-card-overlay { opacity: 1; }
    .sales-card-cat {
      font-size: 0.55rem; color: var(--text-muted);
      letter-spacing: 0.2em; text-transform: uppercase;
      margin-bottom: 4px; font-weight: 300;
    }
    .sales-card-title {
      font-family: var(--font-display);
      font-size: clamp(0.85rem, 1.2vw, 1.1rem); font-weight: 400;
    }
    .sales-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: var(--grid-gap);
    }

    /* ─── Social Feed ─── */
    .social-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: var(--grid-gap);
    }
    .social-card {
      position: relative; overflow: hidden; cursor: pointer;
      background: var(--bg-card);
    }
    .social-card img {
      width: 100%; aspect-ratio: 9/16; object-fit: cover;
      transition: transform 1s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.5s;
    }
    .social-card:hover img { transform: scale(1.02); opacity: 0.85; }
    .social-card-badge {
      position: absolute; top: 10px; left: 10px;
      padding: 3px 8px; font-size: 0.5rem;
      letter-spacing: 0.15em; text-transform: uppercase;
      background: rgba(10, 9, 8, 0.5);
      backdrop-filter: blur(12px); font-weight: 300;
    }
    .social-card-info {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 12px;
      background: linear-gradient(to top, rgba(10,9,8,0.5), transparent);
      opacity: 0; transition: opacity 0.5s;
    }
    .social-card:hover .social-card-info { opacity: 1; }
    .social-card-title { font-size: 0.68rem; font-weight: 300; }

    /* ─── Dashboard Grid ─── */
    .dash-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: var(--grid-gap);
    }
    .dash-card {
      position: relative; overflow: hidden; cursor: pointer;
      background: var(--bg-card); aspect-ratio: 4/3;
    }
    .dash-card img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 1s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.5s;
    }
    .dash-card:hover img { transform: scale(1.02); opacity: 0.85; }
    .dash-card-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: clamp(16px, 2vw, 24px);
      background: linear-gradient(to top, rgba(10,9,8,0.6), transparent);
      opacity: 0; transition: opacity 0.5s;
    }
    .dash-card:hover .dash-card-overlay { opacity: 1; }
    .dash-card-cat {
      font-size: 0.55rem; color: var(--text-muted);
      letter-spacing: 0.2em; text-transform: uppercase;
      margin-bottom: 4px; font-weight: 300;
    }
    .dash-card-title {
      font-family: var(--font-display);
      font-size: clamp(0.82rem, 1.1vw, 1rem); font-weight: 400;
    }

    /* ─── Newsletter ─── */
    .newsletter-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 40px;
    }
    .newsletter-card {
      cursor: pointer;
      transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .newsletter-card:hover { transform: translateY(-6px); }
    .newsletter-cover {
      aspect-ratio: 5/7; overflow: hidden;
      background: var(--bg-card);
      box-shadow: 0 12px 48px rgba(0,0,0,0.4);
      margin-bottom: 20px;
    }
    .newsletter-cover img { width: 100%; height: 100%; object-fit: cover; }
    .newsletter-title {
      font-family: var(--font-display);
      font-size: 0.88rem; font-weight: 400; margin-bottom: 4px;
    }
    .newsletter-meta {
      font-size: 0.62rem; color: var(--text-muted);
      letter-spacing: 0.15em; text-transform: uppercase; font-weight: 300;
    }

    /* ─── Newsletter Reader Modal ─── */
    .reader-modal {
      position: fixed; inset: 0; z-index: 950;
      background: rgba(6, 5, 4, 0.96);
      backdrop-filter: blur(24px);
      display: flex; align-items: center; justify-content: center;
    }
    .reader-book {
      width: 65vw; max-width: 860px;
      aspect-ratio: 1.4/1;
      background: var(--bg-card);
      box-shadow: 0 24px 100px rgba(0,0,0,0.6);
      display: flex; position: relative; overflow: hidden;
    }
    .reader-page {
      flex: 1; padding: 40px;
      display: flex; align-items: center; justify-content: center;
      border-right: 1px solid var(--border);
    }
    .reader-page:last-child { border-right: none; }
    .reader-page img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .reader-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; color: var(--text-muted); transition: color 0.3s;
    }
    .reader-nav:hover { color: var(--text-primary); }
    .reader-nav.prev { left: 12px; }
    .reader-nav.next { right: 12px; }
    .reader-close {
      position: absolute; top: 16px; right: 16px;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; color: var(--text-muted); transition: color 0.3s;
    }
    .reader-close:hover { color: var(--text-primary); }

    /* ─── Contact ─── */
    .contact-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: clamp(60px, 8vw, 140px);
    }
    .contact-info { display: flex; flex-direction: column; gap: 36px; }
    .contact-label {
      font-size: 0.58rem; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--text-muted);
      margin-bottom: 8px; font-weight: 300;
    }
    .contact-value {

  <script type="text/babel">
    function useTweaks(defaults) {
      const [values, setValues] = React.useState(defaults);
      const setTweak = React.useCallback((keyOrEdits, val) => {
        const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
          ? keyOrEdits : { [keyOrEdits]: val };
        setValues((prev) => ({ ...prev, ...edits }));
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
        window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
      }, []);
      return [values, setTweak];
    }

    function TweaksPanel({ title = 'Tweaks', children }) {
      const [open, setOpen] = React.useState(false);
      const dragRef = React.useRef(null);
      const offsetRef = React.useRef({ x: 16, y: 16 });
      const PAD = 16;

      const clampToViewport = React.useCallback(() => {
        const panel = dragRef.current;
        if (!panel) return;
        const w = panel.offsetWidth, h = panel.offsetHeight;
        const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
        const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
        offsetRef.current = {
          x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
          y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
        };
        panel.style.right = offsetRef.current.x + 'px';
        panel.style.bottom = offsetRef.current.y + 'px';
      }, []);

      React.useEffect(() => {
        const onMsg = (e) => {
          const t = e?.data?.type;
          if (t === '__activate_edit_mode') setOpen(true);
          else if (t === '__deactivate_edit_mode') setOpen(false);
        };
        window.addEventListener('message', onMsg);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', onMsg);
      }, []);

      const dismiss = () => {
        setOpen(false);
        window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
      };

      const onDragStart = (e) => {
        const panel = dragRef.current;
        if (!panel) return;
        const r = panel.getBoundingClientRect();
        const sx = e.clientX, sy = e.clientY;
        const startRight = window.innerWidth - r.right;
        const startBottom = window.innerHeight - r.bottom;
        const move = (ev) => {
          offsetRef.current = {
            x: startRight - (ev.clientX - sx),
            y: startBottom - (ev.clientY - sy),
          };
          clampToViewport();
        };
        const up = () => {
          window.removeEventListener('mousemove', move);
          window.removeEventListener('mouseup', up);
        };
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', up);
      };

      if (!open) return null;
      return (
        <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
          <div className="twk-hd" onMouseDown={onDragStart}>
            <b>{title}</b>
            <button className="twk-x" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
          </div>
          <div className="twk-body">{children}</div>
        </div>
      );
    }

    function TweakSection({ label, children }) {
      return (
        <>
          <div className="twk-sect">{label}</div>
          {children}
        </>
      );
    }

    function TweakRadio({ label, value, options, onChange }) {
      const trackRef = React.useRef(null);
      const [dragging, setDragging] = React.useState(false);
      const valueRef = React.useRef(value);
      valueRef.current = value;
      const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
      const idx = Math.max(0, opts.findIndex((o) => o.value === value));
      const n = opts.length;

      const segAt = (clientX) => {
        const r = trackRef.current.getBoundingClientRect();
        const inner = r.width - 4;
        const i = Math.floor(((clientX - r.left - 2) / inner) * n);
        return opts[Math.max(0, Math.min(n - 1, i))].value;
      };

      const onPointerDown = (e) => {
        setDragging(true);
        const v0 = segAt(e.clientX);
        if (v0 !== valueRef.current) onChange(v0);
        const move = (ev) => {
          if (!trackRef.current) return;
          const v = segAt(ev.clientX);
          if (v !== valueRef.current) onChange(v);
        };
        const up = () => {
          setDragging(false);
          window.removeEventListener('pointermove', move);
          window.removeEventListener('pointerup', up);
        };
        window.addEventListener('pointermove', move);
        window.addEventListener('pointerup', up);
      };

      return (
        <div className="twk-row">
          <div className="twk-lbl"><span>{label}</span></div>
          <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
               className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
            <div className="twk-seg-thumb"
                 style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
            {opts.map((o) => (
              <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>
            ))}
          </div>
        </div>
      );
    }

    window.useTweaks = useTweaks;
    window.TweaksPanel = TweaksPanel;
    window.TweakSection = TweakSection;
    window.TweakRadio = TweakRadio;
  </script>

  <!-- ─── Layout components: NavBar, MenuOverlay, Lightbox, ScrollReveal, Footer ─── -->
  <script type="text/babel">
    function ScrollReveal({ children, className, delay }) {
      const ref = React.useRef(null);
      const [visible, setVisible] = React.useState(false);

      React.useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(
          ([entry]) => { if (entry.isIntersecting) { setVisible(true); obs.unobserve(el); } },
          { threshold: 0.12, rootMargin: '0px 0px -40px 0px' }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, []);

      const delayClass = delay ? ' reveal-delay-' + delay : '';
      return (
        <div ref={ref} className={'reveal' + (visible ? ' visible' : '') + delayClass + (className ? ' ' + className : '')}>
          {children}
        </div>
      );
    }

    function NavBar({ activeSection, onMenuToggle, menuOpen }) {
      const [scrolled, setScrolled] = React.useState(false);

      React.useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 60);
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      return (
        <header className={'nav-bar' + (scrolled ? ' scrolled' : '')}>
          <a href="#home" className="nav-logo">Chet Mutaphon</a>
          <button className={'nav-burger' + (menuOpen ? ' open' : '')} onClick={onMenuToggle} aria-label="Menu">
            <span></span><span></span><span></span>
          </button>
        </header>
      );
    }

    function MenuOverlay({ open, activeSection, onClose }) {
      return (
        <div className={'menu-overlay' + (open ? ' open' : '')}>
          <nav>
            {window.NAV_ITEMS.map(function(item) {
              return (
                <a key={item.id} href={'#' + item.id}
                  className={'menu-link' + (activeSection === item.id ? ' active' : '')}
                  onClick={onClose}>
                  {item.label}
                </a>
              );
            })}
          </nav>
        </div>
      );
    }

    function SectionHeader({ title }) {
      return (
        <ScrollReveal>
          <div className="section-header">
            <h2 className="section-title">{title}</h2>
          </div>
        </ScrollReveal>
      );
    }

    function Lightbox({ images, currentIndex, onClose, onNav }) {
      React.useEffect(() => {
        function onKey(e) {
          if (e.key === 'Escape') onClose();
          if (e.key === 'ArrowRight') onNav(1);
          if (e.key === 'ArrowLeft') onNav(-1);
        }
        window.addEventListener('keydown', onKey);
        document.body.style.overflow = 'hidden';
        return () => { window.removeEventListener('keydown', onKey); document.body.style.overflow = ''; };
      }, [onClose, onNav]);

      if (currentIndex < 0 || !images.length) return null;
      return (
        <div className="lightbox" onClick={onClose}>
          <button className="lightbox-close" onClick={onClose}>✕</button>
          {images.length > 1 && (
            <React.Fragment>
              <button className="lightbox-nav prev" onClick={(e) => { e.stopPropagation(); onNav(-1); }}>‹</button>
              <button className="lightbox-nav next" onClick={(e) => { e.stopPropagation(); onNav(1); }}>›</button>
            </React.Fragment>
          )}
          <img src={images[currentIndex]} alt="" onClick={(e) => e.stopPropagation()} style={{ cursor: 'default' }} />
        </div>
      );
    }

    function Footer() {
      return (
        <footer className="footer">
          <span>© 2026 Chet Mutaphon</span>
          <span>Creative Portfolio</span>
        </footer>
      );
    }

    window.ScrollReveal = ScrollReveal;
    window.NavBar = NavBar;
    window.MenuOverlay = MenuOverlay;
    window.SectionHeader = SectionHeader;
    window.Lightbox = Lightbox;

  <script type="text/babel">
    const TWEAK_DEFAULTS = {
      "gridDensity": "tight",
      "typePairing": "classic"
    };

    function App() {
      const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
      const [menuOpen, setMenuOpen] = React.useState(false);
      const [activeSection, setActiveSection] = React.useState('home');
      const [lbImages, setLbImages] = React.useState([]);
      const [lbIndex, setLbIndex] = React.useState(-1);

      const effectiveGap = tweaks.gridDensity === 'tight' ? 4 : tweaks.gridDensity === 'spacious' ? 16 : 8;
      const effectiveTweaks = Object.assign({}, tweaks, { gridGap: effectiveGap });

      React.useEffect(function() {
        const root = document.documentElement;
        if (tweaks.typePairing === 'classic') {
          root.style.setProperty('--font-display', "'Playfair Display', Georgia, serif");
          root.style.setProperty('--font-body', "'Helvetica Neue', Helvetica, Arial, sans-serif");
        } else {
          root.style.setProperty('--font-display', "'Cormorant Garamond', Georgia, serif");
          root.style.setProperty('--font-body', "'DM Sans', 'Helvetica Neue', sans-serif");
        }
      }, [tweaks.typePairing]);

      React.useEffect(function() {
        function onScroll() {
          const sections = window.NAV_ITEMS.map(function(n) { return n.id; });
          for (let i = sections.length - 1; i >= 0; i--) {
            const el = document.getElementById(sections[i]);
            if (el && el.getBoundingClientRect().top <= 200) {
              setActiveSection(sections[i]);
              break;
            }
          }
        }
        window.addEventListener('scroll', onScroll, { passive: true });
        return function() { window.removeEventListener('scroll', onScroll); };
      }, []);

      React.useEffect(function() {
        if (menuOpen) document.body.style.overflow = 'hidden';
        else document.body.style.overflow = '';
        return function() { document.body.style.overflow = ''; };
      }, [menuOpen]);

      function openLightbox(images, index) {
        setLbImages(images);
        setLbIndex(index);
      }

      function navLightbox(dir) {
        setLbIndex(function(prev) {
          const next = prev + dir;
          if (next < 0) return lbImages.length - 1;
          if (next >= lbImages.length) return 0;
          return next;
        });
      }

      return (
        <React.Fragment>
          <NavBar
            activeSection={activeSection}
            menuOpen={menuOpen}
            onMenuToggle={() => setMenuOpen(!menuOpen)}
          />
          <MenuOverlay
            open={menuOpen}
            activeSection={activeSection}
            onClose={() => setMenuOpen(false)}
          />

          <main>
            <HeroSection />
            <AboutSection />
            {/* <WorksSection tweaks={effectiveTweaks} onImageClick={openLightbox} /> */}
            <PhotoSection tweaks={effectiveTweaks} onImageClick={openLightbox} />
            <VideoSection tweaks={effectiveTweaks} />
            <FnbSection tweaks={effectiveTweaks} onImageClick={openLightbox} />
            <SalesSection tweaks={effectiveTweaks} onImageClick={openLightbox} />
            <SocialSection tweaks={effectiveTweaks} />
            <DashboardSection tweaks={effectiveTweaks} onImageClick={openLightbox} />
            <NewsletterSection />
            <ContactSection />
            <Footer />
          </main>

          {lbIndex >= 0 && (
            <Lightbox
              images={lbImages}
              currentIndex={lbIndex}
              onClose={() => setLbIndex(-1)}
              onNav={navLightbox}
            />
          )}

          <TweaksPanel title="Design Controls">
            <TweakSection label="Typography">
              <TweakRadio label="Type Pairing" value={tweaks.typePairing}
                options={[
                  { value: 'classic', label: 'Playfair + Helvetica' },
                  { value: 'editorial', label: 'Cormorant + DM Sans' }
                ]}
                onChange={(v) => setTweak('typePairing', v)} />
            </TweakSection>
            <TweakSection label="Grid Layout">
              <TweakRadio label="Grid Density" value={tweaks.gridDensity}
                options={[
                  { value: 'tight', label: 'Tight' },
                  { value: 'normal', label: 'Normal' },
                  { value: 'spacious', label: 'Spacious' }
                ]}
                onChange={(v) => setTweak('gridDensity', v)} />
            </TweakSection>
          </TweaksPanel>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
