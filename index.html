<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chet Mutaphon — Creative Portfolio</title>
  <meta name="description" content="Chet Mutaphon — Creative Director & Visual Storyteller. Luxury hospitality photography, brand campaigns, and editorial design from Phuket, Thailand.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Chet Mutaphon Portfolio — Apple-Inspired Clean Minimal ── */
    :root {
      --font: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      --bg: #F4F2E9; --bg-alt: #EBE9E0;
      --text: #1D1D1F; --text-2: #6E6E73; --text-3: #86868B; --text-4: #AEAEB2;
      --accent: #0071E3;
      --border: rgba(0,0,0,0.06);
      --shadow-s: 0 2px 12px rgba(0,0,0,0.05);
      --shadow-m: 0 8px 30px rgba(0,0,0,0.08);
      --r: 16px; --r-s: 8px; --r-l: 24px;
      --pad: clamp(24px, 6vw, 120px);
      --sec: clamp(80px, 12vh, 160px);
      --gap: 16px; --cols: 3;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }
    img { display: block; max-width: 100%; height: auto; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }

    /* ── Navigation ── */
    .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 900; display: flex; align-items: center; justify-content: space-between; padding: 20px var(--pad); transition: background 0.5s, backdrop-filter 0.5s, box-shadow 0.5s; }
    .nav.scrolled { background: rgba(244,242,233,0.82); backdrop-filter: blur(20px) saturate(1.8); -webkit-backdrop-filter: blur(20px) saturate(1.8); box-shadow: 0 0.5px 0 var(--border); }
    .nav-logo { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.28em; text-transform: uppercase; color: var(--text-2); transition: color 0.3s; }
    .nav-logo:hover { color: var(--text); }
    .nav-burger { width: 26px; height: 16px; display: flex; flex-direction: column; justify-content: space-between; padding: 0; }
    .nav-burger span { display: block; width: 100%; height: 1.5px; background: var(--text); border-radius: 1px; transition: transform 0.4s cubic-bezier(0.22,1,0.36,1), opacity 0.3s; transform-origin: center; }
    .nav-burger.open span:nth-child(1) { transform: translateY(7.25px) rotate(45deg); }
    .nav-burger.open span:nth-child(2) { opacity: 0; }
    .nav-burger.open span:nth-child(3) { transform: translateY(-7.25px) rotate(-45deg); }

    /* ── Menu Overlay ── */
    .menu-overlay { position: fixed; inset: 0; z-index: 800; background: rgba(244,242,233,0.97); -webkit-backdrop-filter: blur(40px); backdrop-filter: blur(40px); display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.5s cubic-bezier(0.22,1,0.36,1); }
    .menu-overlay.open { opacity: 1; pointer-events: all; }
    .menu-overlay nav { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .menu-link { font-size: clamp(1.2rem, 2.5vw, 1.8rem); font-weight: 500; color: var(--text-3); padding: 8px 0; transition: color 0.3s, transform 0.5s cubic-bezier(0.22,1,0.36,1), opacity 0.5s; transform: translateY(12px); opacity: 0; }
    .menu-overlay.open .menu-link { transform: translateY(0); opacity: 1; }
    .menu-link:hover, .menu-link.active { color: var(--accent); }

    /* ── Hero ── */
    .hero { height: 100vh; min-height: 600px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; position: relative; padding: 0 var(--pad); overflow: hidden; background: #F4F2E9; }
    .hero-label { font-size: 0.62rem; font-weight: 500; letter-spacing: 0.4em; text-transform: uppercase; color: var(--text-3); margin-bottom: 28px; animation: fadeUp 0.8s ease 0.2s both; }
    .hero-name { font-size: clamp(3.2rem, 8vw, 7.5rem); font-weight: 700; line-height: 0.95; letter-spacing: -0.03em; perspective: 400px; }
    .hero-divider { width: 40px; height: 1.5px; background: var(--accent); margin: 28px auto; border-radius: 1px; animation: fadeUp 0.8s ease 0.5s both; }
    .hero-role { font-size: clamp(0.9rem, 1.2vw, 1.1rem); color: #000000; font-weight: 400; animation: fadeUp 0.8s ease 0.6s both; }
    .hero-location { font-size: 0.75rem; color: #000000; margin-top: 8px; font-weight: 400; letter-spacing: 0.08em; animation: fadeUp 0.8s ease 0.7s both; }
    .hero-scroll { position: absolute; bottom: 36px; color: var(--text-4); animation: fadeUp 0.8s ease 1s both; will-change: opacity; }
    .hero-scroll svg { animation: scrollBounce 2.5s ease-in-out infinite; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scrollBounce { 0%, 100% { transform: translateY(0); opacity: 0.3; } 50% { transform: translateY(6px); opacity: 0.7; } }

    /* ── Sections ── */
    .section { padding: var(--sec) var(--pad); }
    .section--alt { background: var(--bg-alt); }
    .section-hd { margin-bottom: clamp(40px, 5vh, 72px); }
    .section-title { font-size: clamp(1.6rem, 3vw, 2.4rem); font-weight: 600; letter-spacing: -0.01em; line-height: 1.2; position: relative; display: inline-block; padding-bottom: 16px; }
    .section-title::after { content: ''; position: absolute; bottom: 0; left: 0; width: 32px; height: 2px; background: var(--accent); border-radius: 1px; transform: scaleX(0); transform-origin: left; transition: transform 0.8s cubic-bezier(0.22,1,0.36,1) 0.3s; }
    .reveal.visible .section-title::after { transform: scaleX(1); }

    /* ── About ── */
    .about-grid { display: grid; grid-template-columns: 0.8fr 1fr; gap: clamp(48px, 6vw, 120px); align-items: start; }
    .about-portrait { aspect-ratio: 3/4; border-radius: var(--r-l); overflow: hidden; background: var(--bg-alt); }
    .about-portrait img { width: 100%; height: 100%; object-fit: cover; }
    .about-bio { font-size: 0.95rem; line-height: 1.9; color: var(--text-2); margin-bottom: 40px; font-weight: 400; }
    .about-exp-item { padding: 20px 0; border-bottom: 1px solid var(--border); }
    .about-exp-role { font-size: 1rem; font-weight: 500; margin-bottom: 2px; }
    .about-exp-company { color: var(--text-2); font-size: 0.82rem; font-weight: 400; }
    .about-exp-period { font-size: 0.7rem; color: var(--text-3); margin-top: 6px; letter-spacing: 0.08em; font-weight: 400; }
    .about-skills { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 40px; }
    .skill-tag { font-size: 0.68rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-2); font-weight: 500; padding: 6px 14px; border-radius: 20px; background: var(--bg); border: 1px solid var(--border); transition: all 0.3s; }
    .section--alt .skill-tag { background: var(--bg-alt); }
    .skill-tag:hover { color: var(--accent); border-color: var(--accent); }

    /* ── Shared Card ── */
    .card { border-radius: var(--r); overflow: hidden; cursor: pointer; transition: transform 0.5s cubic-bezier(0.22,1,0.36,1), box-shadow 0.5s; }
    .card:hover { transform: translateY(-6px); box-shadow: 0 24px 60px rgba(0,0,0,0.1); }
    .card-img { position: relative; overflow: hidden; background: var(--bg-alt); }
    .card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s cubic-bezier(0.22,1,0.36,1); }
    .card:hover .card-img img { transform: scale(1.03); }
    .card-info { padding: 14px 4px 4px; }
    .card-title { font-size: 0.85rem; font-weight: 500; color: var(--text); }
    .card-cat { font-size: 0.68rem; color: var(--text-3); margin-top: 2px; letter-spacing: 0.04em; font-weight: 400; }
    .card-grid { display: grid; gap: var(--gap); }
    .cols-2 { grid-template-columns: repeat(2, 1fr); }
    .cols-3 { grid-template-columns: repeat(3, 1fr); }

    /* ── Photo Masonry ── */
    .photo-filters { display: flex; gap: 20px; margin-bottom: 32px; flex-wrap: wrap; }
    .filter-btn { padding: 6px 0; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); font-weight: 500; transition: color 0.3s; position: relative; }
    .filter-btn::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1.5px; background: var(--accent); transform: scaleX(0); transition: transform 0.3s; border-radius: 1px; }
    .filter-btn:hover, .filter-btn.active { color: var(--text); }
    .filter-btn.active::after { transform: scaleX(1); }
    .masonry-grid { column-count: var(--cols); column-gap: var(--gap); }
    .masonry-grid > .reveal, .masonry-grid > .flip-container { break-inside: avoid; margin-bottom: var(--gap); }
    .masonry-item { border-radius: var(--r); overflow: hidden; cursor: pointer; position: relative; transition: transform 0.5s cubic-bezier(0.22,1,0.36,1), box-shadow 0.5s; }
    .masonry-item:hover { transform: translateY(-4px); box-shadow: 0 20px 50px rgba(0,0,0,0.08); }
    .masonry-item img { width: 100%; display: block; aspect-ratio: 3/4; object-fit: cover; transition: transform 1s cubic-bezier(0.22,1,0.36,1); }
    .masonry-item:hover img { transform: scale(1.05) rotate(0.3deg); }

    /* ── Video ── */
    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: var(--gap); }
    .video-card { cursor: pointer; }
    .video-inner { aspect-ratio: 9/16; border-radius: var(--r); overflow: hidden; position: relative; background: var(--bg-alt); }
    .video-inner img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s cubic-bezier(0.22,1,0.36,1); }
    .video-card:hover .video-inner img { transform: scale(1.03); }
    .video-play { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 48px; height: 48px; border: 1.5px solid rgba(255,255,255,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); background: rgba(0,0,0,0.15); opacity: 0.8; transition: opacity 0.3s, transform 0.3s; }
    .video-card:hover .video-play { opacity: 1; transform: translate(-50%,-50%) scale(1.05); }
    .video-play::after { content: ''; width: 0; height: 0; border-left: 12px solid rgba(255,255,255,0.9); border-top: 7px solid transparent; border-bottom: 7px solid transparent; margin-left: 3px; }

    /* ── F&B Grid ── */
    .fnb-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--gap); }

    /* ── Sales ── */
    .sales-featured { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--gap); margin-bottom: var(--gap); }
    .sales-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--gap); }

    /* ── Social ── */
    .social-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: var(--gap); }
    .social-badge { position: absolute; top: 10px; left: 10px; padding: 4px 10px; font-size: 0.55rem; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500; background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); border-radius: 6px; color: var(--text-2); z-index: 2; }

    /* ── Dashboard ── */
    .dash-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--gap); }

    /* ── Newsletter ── */
    .newsletter-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; }
    .newsletter-cover { aspect-ratio: 5/7; border-radius: var(--r); overflow: hidden; background: var(--bg-alt); box-shadow: var(--shadow-s); margin-bottom: 16px; transition: box-shadow 0.4s, transform 0.4s; }
    .newsletter-card:hover .newsletter-cover { box-shadow: 0 24px 60px rgba(0,0,0,0.1); transform: translateY(-6px); }
    .newsletter-cover img { width: 100%; height: 100%; object-fit: cover; }
    .newsletter-title { font-size: 0.85rem; font-weight: 500; }
    .newsletter-meta { font-size: 0.68rem; color: var(--text-3); margin-top: 4px; }

    /* ── Contact ── */
    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(48px, 6vw, 120px); }
    .contact-info { display: flex; flex-direction: column; gap: 32px; }
    .contact-label { font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--text-3); margin-bottom: 6px; font-weight: 500; }
    .contact-value { font-size: 1.05rem; color: var(--text-2); font-weight: 400; transition: color 0.3s; }
    a.contact-value:hover { color: var(--accent); }
    .contact-form { display: flex; flex-direction: column; gap: 20px; }
    .form-field { display: flex; flex-direction: column; gap: 6px; }
    .form-field label { font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-3); font-weight: 500; }
    .form-field input, .form-field textarea { background: var(--bg-alt); border: 1px solid var(--border); border-radius: var(--r-s); padding: 12px 16px; font-family: var(--font); font-size: 0.88rem; color: var(--text); transition: border-color 0.3s, box-shadow 0.3s; outline: none; }
    .form-field input:focus, .form-field textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,113,227,0.08); }
    .form-field textarea { min-height: 100px; resize: none; }
    .form-submit { align-self: flex-start; padding: 12px 32px; font-size: 0.82rem; font-weight: 500; letter-spacing: 0.02em; background: var(--text); color: #fff; border-radius: var(--r-s); transition: background 0.3s, transform 0.2s; }
    .form-submit:hover { background: var(--accent); transform: translateY(-1px); }

    /* ── Footer ── */
    .footer { padding: 32px var(--pad); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-size: 0.72rem; color: var(--text-3); font-weight: 400; }

    /* ── Lightbox ── */
    .lightbox { position: fixed; inset: 0; z-index: 960; background: rgba(0,0,0,0.92); display: flex; align-items: center; justify-content: center; cursor: zoom-out; -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); }
    .lightbox img { max-width: 88vw; max-height: 88vh; object-fit: contain; animation: lbIn 0.4s cubic-bezier(0.22,1,0.36,1); border-radius: 4px; }
    @keyframes lbIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
    .lb-btn { position: absolute; color: rgba(255,255,255,0.6); font-size: 1.2rem; transition: color 0.3s; background: none; border: none; cursor: pointer; }
    .lb-btn:hover { color: #fff; }
    .lb-close { top: 24px; right: 28px; }
    .lb-prev { top: 50%; left: 20px; transform: translateY(-50%); }
    .lb-next { top: 50%; right: 20px; transform: translateY(-50%); }

    /* ── Animation Enhancements ── */
    /* ── Hero Background Animation ── */
    .hero-bg { position: absolute; inset: -100px; overflow: hidden; pointer-events: none; z-index: 0; }
    .mesh-blob { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.09; animation: blobDrift ease-in-out infinite alternate; will-change: transform; transform: translate(-50%, -50%); }
    @keyframes blobDrift {
      0% { transform: translate(-50%, -50%) translate(0, 0) scale(1); }
      33% { transform: translate(-50%, -50%) translate(50px, -70px) scale(1.12); }
      66% { transform: translate(-50%, -50%) translate(-40px, 50px) scale(0.9); }
      100% { transform: translate(-50%, -50%) translate(25px, -30px) scale(1.05); }
    }
    .hero-particle { position: absolute; border-radius: 50%; background: var(--accent); animation: particleDrift ease-in-out infinite alternate; will-change: transform; }
    @keyframes particleDrift {
      0% { transform: translate(0, 0); opacity: 0.5; }
      50% { transform: translate(25px, -35px); opacity: 1; }
      100% { transform: translate(-18px, 22px); opacity: 0.6; }
    }
    .hero-glow { position: absolute; top: 50%; left: 50%; width: 600px; height: 600px; transform: translate(-50%, -50%); border-radius: 50%; background: radial-gradient(circle, var(--accent), transparent 65%); opacity: 0.03; animation: glowPulse 8s ease-in-out infinite alternate; pointer-events: none; }
    @keyframes glowPulse { 0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.02; } 100% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.05; } }
    .hero-parallax { display: flex; flex-direction: column; align-items: center; text-align: center; will-change: transform, opacity; z-index: 2; }
    .hero-mouse { will-change: transform; transition: transform 0.12s ease-out; }
    /* ── 3D Flip Cards ── */
    .flip-container { perspective: 1200px; }
    .flip-inner { position: relative; transform-style: preserve-3d; transform: rotateY(180deg); transition: transform 0.9s cubic-bezier(0.4, 0, 0.2, 1); }
    .flip-container.flipped .flip-inner { transform: rotateY(0deg); }
    .flip-front { position: relative; backface-visibility: hidden; }
    .flip-back { position: absolute; inset: 0; backface-visibility: hidden; transform: rotateY(180deg); display: flex; align-items: center; justify-content: center; background: var(--bg-alt); border-radius: var(--r); border: 1px solid var(--border); overflow: hidden; }
    .section--alt .flip-back { background: var(--bg); }
    .flip-back::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(45deg, transparent, transparent 24px, rgba(0,0,0,0.012) 24px, rgba(0,0,0,0.012) 25px); }
    .flip-brand-inner { display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 1; }
    .flip-monogram { font-size: 2.2rem; font-weight: 700; letter-spacing: 0.15em; color: var(--text-4); opacity: 0.35; }
    .flip-accent-line { width: 24px; height: 1.5px; background: var(--accent); border-radius: 1px; opacity: 0.5; }
    .flip-brand-name { font-size: 0.52rem; font-weight: 500; letter-spacing: 0.3em; text-transform: uppercase; color: var(--text-4); }
    .char-anim { display: inline-block; opacity: 0; transform: translateY(50px) rotateX(-60deg); animation: charIn 0.6s cubic-bezier(0.22,1,0.36,1) forwards; }
    @keyframes charIn { to { opacity: 1; transform: translateY(0) rotateX(0deg); } }
    .skill-tag { animation: tagPop 0.5s cubic-bezier(0.22,1,0.36,1) both; }
    @keyframes tagPop { from { opacity: 0; transform: scale(0.8) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .video-card { transition: transform 0.5s cubic-bezier(0.22,1,0.36,1); }
    .video-card:hover { transform: translateY(-4px); }

    /* ── Scroll Reveal ── */
    .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.9s cubic-bezier(0.22,1,0.36,1), transform 0.9s cubic-bezier(0.22,1,0.36,1); }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ── Responsive ── */
    @media (max-width: 960px) {
      :root { --cols: 2; }
      .about-grid, .contact-grid, .dash-grid, .sales-featured { grid-template-columns: 1fr; }
      .cols-2 { grid-template-columns: 1fr; }
      .cols-3, .fnb-grid, .sales-grid, .newsletter-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      :root { --cols: 2; --gap: 10px; }
      .cols-3, .fnb-grid, .sales-grid { grid-template-columns: 1fr; }
      .newsletter-grid { grid-template-columns: 1fr; }
      .video-grid { grid-template-columns: repeat(2, 1fr); }
      .social-grid { grid-template-columns: repeat(2, 1fr); }
      .hero-name { font-size: clamp(2.6rem, 12vw, 4rem); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    /* ═══════ TWEAK DEFAULTS ═══════ */
    var TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accentColor": "#0071E3",
      "cardRadius": "28",
      "gridGap": "16"
    }/*EDITMODE-END*/;

    /* ═══════ SITE DATA ═══════ */
    var SITE_CONFIG = {
      name: "Chet Mutaphon",
      title: "Creative & Visual Storyteller",
      tagline: "Crafting brand experiences through design, photography, and strategic visual communication",
      email: "chet.mutaphon@gmail.com",
      linkedin: "https://www.linkedin.com/in/chet-mutaphon-84b5ab175",
      experience: "5+",
      location: "Phuket, Thailand"
    };

    var NAV_ITEMS = [
      { id: "home", label: "Home" }, { id: "about", label: "About" },
      { id: "photo", label: "Photo" },
      { id: "video", label: "Video" }, { id: "fnb", label: "F&B Promotions" },
      { id: "social", label: "Social Content" },
      { id: "contact", label: "Contact" }
    ];

    var ABOUT_DATA = {
      bio: "With over five years of experience in hospitality marketing, brand design, and visual storytelling, I bring a cinematic eye to every project. My work spans luxury resort campaigns, editorial photography, food & beverage branding, and digital content strategy.",
      experience: [
        { role: "Marketing Executive & Graphic Designer", company: "Renaissance Phuket Resort and Spa", period: "2025 — Present" },
        { role: "Barista Manager & Brand Marketing Specialist", company: "NAP's Coffee Roaster Ubon", period: "2019 — 2025" }
      ],
      skills: ["Brand Design", "Art Direction", "Photography", "Videography", "Editor", "Social Media Strategy", "Campaign Design", "AI Generative"]
    };

    /* ── Light-theme placeholder ── */
    function makePlaceholder(w, h, label, hue) {

// ── useTweaks ───────────────────────────────────────────────────────────────
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}

}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
  </script>

  <script type="text/babel">
/* ── Portfolio Layout Components ── */

function ScrollReveal({ children, className, style }) {
  const ref = React.useRef(null);
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { setVisible(true); obs.unobserve(el); } },
      { threshold: 0.1, rootMargin: '0px 0px -30px 0px' }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return (
    <div ref={ref} className={'reveal' + (visible ? ' visible' : '') + (className ? ' ' + className : '')} style={style}>
      {children}
    </div>
  );
}

function NavBar({ activeSection, onMenuToggle, menuOpen }) {
  const [scrolled, setScrolled] = React.useState(false);
  React.useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 60);
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return (
    <header className={'nav' + (scrolled ? ' scrolled' : '')}>
      <a href="#home" className="nav-logo">{window.SITE_CONFIG.name}</a>
      <button className={'nav-burger' + (menuOpen ? ' open' : '')} onClick={onMenuToggle} aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </header>
  );
}

function MenuOverlay({ open, activeSection, onClose }) {
  return (
    <div className={'menu-overlay' + (open ? ' open' : '')}>
      <nav>
        {window.NAV_ITEMS.map(function (item, i) {
          return (
            <a key={item.id} href={'#' + item.id}
              className={'menu-link' + (activeSection === item.id ? ' active' : '')}
              style={{ transitionDelay: open ? (i * 0.03) + 's' : '0s' }}
              onClick={onClose}>
              {item.label}
            </a>
          );
        })}
      </nav>
    </div>
  );
}

function SectionHeader({ title }) {
  return (
    <ScrollReveal>
      <div className="section-hd">
        <h2 className="section-title">{title}</h2>
      </div>
    </ScrollReveal>
  );
}

function Lightbox({ images, currentIndex, onClose, onNav }) {
  React.useEffect(() => {
    function onKey(e) {
      if (e.key === 'Escape') onClose();
      if (e.key === 'ArrowRight') onNav(1);
      if (e.key === 'ArrowLeft') onNav(-1);
    }
    window.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    return () => { window.removeEventListener('keydown', onKey); document.body.style.overflow = ''; };
  }, [onClose, onNav]);

  if (currentIndex < 0 || !images.length) return null;
  return (
    <div className="lightbox" onClick={onClose}>
      <button className="lb-btn lb-close" onClick={onClose}>✕</button>
      {images.length > 1 && (
        <>
          <button className="lb-btn lb-prev" onClick={(e) => { e.stopPropagation(); onNav(-1); }}>‹</button>
          <button className="lb-btn lb-next" onClick={(e) => { e.stopPropagation(); onNav(1); }}>›</button>
        </>
      )}
      <img src={images[currentIndex]} alt="" onClick={(e) => e.stopPropagation()} style={{ cursor: 'default' }} />
    </div>
  );
}

function Footer() {
  return (
    <footer className="footer">
      <span>© 2026 {window.SITE_CONFIG.name}</span>
      <span>Creative Portfolio</span>
    </footer>

/* ── Shared Card Component ── */
function Card({ img, title, category, aspect, onClick, children }) {
  const [imgError, setImgError] = React.useState(false);
  return (
    <div className="card" onClick={onClick}>
      <div className="card-img" style={aspect ? { aspectRatio: aspect } : undefined}>

        <div className="card-info">

          {category && category !== '-' && <div className="card-cat">{category}</div>}
        </div>
      )}
      {children}
    </div>
  );
}

  <script type="text/babel">
/* ── Portfolio Animation Utilities ── */

/* ── Hero background: mesh gradient blobs + floating particles + center glow ── */
function HeroBg() {
  var blobs = [
    { size: 520, x: '12%', y: '18%', color: 'var(--accent)', dur: 22, delay: 0 },
    { size: 420, x: '78%', y: '28%', color: '#882FF4', dur: 27, delay: 3 },
    { size: 380, x: '62%', y: '72%', color: '#34C9EB', dur: 24, delay: 5 },
    { size: 480, x: '25%', y: '78%', color: '#FF6B9D', dur: 30, delay: 2 },
    { size: 320, x: '88%', y: '82%', color: '#0A861A', dur: 20, delay: 7 },
  ];

  var particles = React.useMemo(function () {
    var p = [];
    for (var i = 0; i < 24; i++) {
      p.push({
        x: ((i * 37 + 13) % 97) + '%',
        y: ((i * 53 + 7) % 93) + '%',
        size: 2 + (i % 3),
        dur: 12 + (i * 1.3),
        delay: i * 0.7,
        opacity: 0.08 + (i % 5) * 0.04,
      });
    }
    return p;
  }, []);

  return (
    <div className="hero-bg">
      {blobs.map(function (b, i) {
        return (
          <div key={'b' + i} className="mesh-blob" style={{
            width: b.size, height: b.size,
            left: b.x, top: b.y,
            background: b.color,
            animationDuration: b.dur + 's',
            animationDelay: b.delay + 's',
          }} />
        );
      })}
      {particles.map(function (p, i) {
        return (
          <div key={'p' + i} className="hero-particle" style={{
            left: p.x, top: p.y,
            width: p.size, height: p.size,
            animationDuration: p.dur + 's',
            animationDelay: p.delay + 's',
            opacity: p.opacity,
          }} />
        );
      })}
      <div className="hero-glow"></div>
    </div>
  );
}

/* ── Split text character-by-character animation ── */
function SplitText({ text, delay, className }) {
  delay = delay || 0;
  var chars = text.split('');
  return (
    <span className={className || ''} aria-label={text}>
      {chars.map(function (ch, i) {
        return (
          <span key={i} className="char-anim"
            style={{ animationDelay: (delay + i * 0.04) + 's' }}
            aria-hidden="true">
            {ch === ' ' ? ' ' : ch}
          </span>
        );
      })}
    </span>
  );
}

/* ── Stagger wrapper — wraps each child in a ScrollReveal with increasing delay ── */
function StaggerGrid({ children, stagger }) {
  stagger = stagger || 0.07;
  var items = React.Children.toArray(children);
  return items.map(function (child, i) {
    return (
      <ScrollReveal key={child.key || i} style={{ transitionDelay: (i * stagger) + 's' }}>
        {child}
      </ScrollReveal>
    );
  });
}

/* ── Parallax section wrapper — shifts content on scroll for depth ── */
function ParallaxSection({ children, speed, className, id, style }) {
  var ref = React.useRef(null);
  speed = speed || 0.05;

  React.useEffect(function () {
    var el = ref.current;
    if (!el) return;
    var ticking = false;
    var onScroll = function () {
      if (!ticking) {
        requestAnimationFrame(function () {
          var rect = el.getBoundingClientRect();
          var center = rect.top + rect.height / 2;
          var viewCenter = window.innerHeight / 2;
          var offset = (center - viewCenter) * speed;
          el.style.setProperty('--px', offset + 'px');
          ticking = false;
        });
        ticking = true;
      }
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return function () { window.removeEventListener('scroll', onScroll); };
  }, [speed]);

  return (
    <section ref={ref} className={className} id={id} style={style}>
      {children}
    </section>
  );
}

/* ── 3D Flip Card — shows branded back, flips to reveal content on scroll ── */
function FlipCard({ children, delay }) {
  delay = delay || 0;
  var ref = React.useRef(null);
  var [flipped, setFlipped] = React.useState(false);

  React.useEffect(function () {
    var el = ref.current;
    if (!el) return;
    var timer;
    var obs = new IntersectionObserver(
      function (entries) {
        if (entries[0].isIntersecting) {
          timer = setTimeout(function () { setFlipped(true); }, delay * 1000);
          obs.unobserve(el);
        }
      },
      { threshold: 0.12, rootMargin: '0px 0px -30px 0px' }
    );
    obs.observe(el);
    return function () { obs.disconnect(); clearTimeout(timer); };
  }, [delay]);

  return (
    <div ref={ref} className={'flip-container' + (flipped ? ' flipped' : '')}>
      <div className="flip-inner">
        <div className="flip-back">
          <div className="flip-brand-inner">
            <div className="flip-monogram">CM</div>
            <div className="flip-accent-line"></div>
            <div className="flip-brand-name">Chet Mutaphon</div>
          </div>
        </div>
        <div className="flip-front">
          {children}
        </div>
      </div>
    </div>
  );
}

/* ── FlipGrid — wraps each child in a FlipCard with staggered delay ── */
function FlipGrid({ children, stagger }) {
  stagger = stagger || 0.12;
  var items = React.Children.toArray(children);
  return items.map(function (child, i) {
    return (
      <FlipCard key={child.key || i} delay={i * stagger}>
        {child}
      </FlipCard>
    );
  });
}

Object.assign(window, { HeroBg, SplitText, StaggerGrid, FlipCard, FlipGrid, ParallaxSection });

            parallaxRef.current.style.transform = 'translateY(' + (sy * 0.28) + 'px)';

          {items.map(function (item) {
            return (
              <Card key={item.id} img={item.thumbnail} title={item.title} aspect="1/1"
                onClick={function () { onImageClick(items.map(function (x) { return x.thumbnail; }), items.indexOf(item)); }}>
                <div className="social-badge">{item.type}</div>
              </Card>
            );
          })}
        </FlipGrid>
      </div>
    </section>
  );
}

function DashboardSection({ onImageClick }) {
  var items = window.DASHBOARD_ITEMS;
  return (
    <section className="section" id="dashboard">
      <SectionHeader title="Dashboard &amp; Case Studies" />
      <div className="dash-grid">
        <FlipGrid stagger={0.12}>
          {items.map(function (item) {
            return (
              <Card key={item.id} img={item.img} title={item.title} category={item.category} aspect="4/3"
                onClick={function () { onImageClick(items.map(function (x) { return x.img; }), items.indexOf(item)); }} />
            );
          })}
        </FlipGrid>
      </div>
    </section>
  );
}

function NewsletterSection({ onImageClick }) {
  var items = window.NEWSLETTER_ITEMS;
  return (
    <section className="section section--alt" id="newsletter">
      <SectionHeader title="Newsletter" />
      <div className="newsletter-grid">
        <FlipGrid stagger={0.12}>
          {items.map(function (item) {
            return (
              <div key={item.id} className="newsletter-card" style={{ cursor: 'pointer' }}
                onClick={function () { onImageClick(items.map(function (x) { return x.cover; }), items.indexOf(item)); }}>
                <div className="newsletter-cover">
                  <img src={item.cover} alt={item.title} />
                </div>
                <div className="newsletter-title">{item.title}</div>
                <div className="newsletter-meta">{item.date} · {item.pages} pages</div>
              </div>
            );
          })}
        </FlipGrid>
      </div>
    </section>
  );
}

function ContactSection() {
  var [form, setForm] = React.useState({ name: '', email: '', message: '' });
  var [sent, setSent] = React.useState(false);

  var handleSubmit = function (e) {
    e.preventDefault();
    if (form.name && form.email && form.message) {
      setSent(true);
      setTimeout(function () { setSent(false); setForm({ name: '', email: '', message: '' }); }, 3000);
    }
  };

  return (
    <section className="section" id="contact">
      <SectionHeader title="Contact" />
      <div className="contact-grid">
        <ScrollReveal>
          <div className="contact-info">
            <div>
              <div className="contact-label">Email</div>
              <a href={'mailto:' + window.SITE_CONFIG.email} className="contact-value">{window.SITE_CONFIG.email}</a>
            </div>
            <div>
              <div className="contact-label">LinkedIn</div>
              <a href={window.SITE_CONFIG.linkedin} target="_blank" rel="noopener" className="contact-value">Connect on LinkedIn →</a>
            </div>
            <div>
              <div className="contact-label">Location</div>
              <div className="contact-value">{window.SITE_CONFIG.location}</div>
            </div>
            <div>
              <div className="contact-label">Experience</div>
              <div className="contact-value">{window.SITE_CONFIG.experience} years in creative &amp; hospitality</div>
            </div>
          </div>
        </ScrollReveal>
        <ScrollReveal style={{ transitionDelay: '0.15s' }}>
          <form className="contact-form" onSubmit={handleSubmit}>
            <div className="form-field">
              <label>Name</label>
              <input type="text" value={form.name} placeholder="Your name"
                onChange={function (e) { setForm(Object.assign({}, form, { name: e.target.value })); }} />
            </div>
            <div className="form-field">
              <label>Email</label>
              <input type="email" value={form.email} placeholder="your@email.com"
                onChange={function (e) { setForm(Object.assign({}, form, { email: e.target.value })); }} />
            </div>
            <div className="form-field">
              <label>Message</label>
              <textarea value={form.message} placeholder="Tell me about your project..."
                onChange={function (e) { setForm(Object.assign({}, form, { message: e.target.value })); }}></textarea>
            </div>
            <button type="submit" className="form-submit">
              {sent ? '✓ Message Sent' : 'Send Message'}
            </button>
          </form>
        </ScrollReveal>
      </div>
    </section>
  );
}

Object.assign(window, {
  HeroSection, AboutSection, WorksSection, PhotoSection, VideoSection,
  FnbSection, SalesSection, SocialSection, DashboardSection,
  NewsletterSection, ContactSection
});
  </script>

  <!-- ═══════ App Root ═══════ -->
  <script type="text/babel">
/* ── Portfolio App Root ── */

function App() {
  var [t, setTweak] = useTweaks(window.TWEAK_DEFAULTS);
  var [menuOpen, setMenuOpen] = React.useState(false);
  var [activeSection, setActiveSection] = React.useState('home');
  var [lbImages, setLbImages] = React.useState([]);
  var [lbIndex, setLbIndex] = React.useState(-1);

  /* Apply tweaks as CSS vars */
  React.useEffect(function () {
    var r = document.documentElement;
    r.style.setProperty('--accent', t.accentColor);
    r.style.setProperty('--r', t.cardRadius + 'px');
    r.style.setProperty('--r-l', (parseInt(t.cardRadius) + 8) + 'px');
    r.style.setProperty('--r-s', Math.max(4, parseInt(t.cardRadius) - 8) + 'px');
    r.style.setProperty('--gap', t.gridGap + 'px');
  }, [t]);

  /* Track active section on scroll */
  React.useEffect(function () {
    var ids = window.NAV_ITEMS.map(function (n) { return n.id; });
    var onScroll = function () {
      var scrollY = window.scrollY + 200;
      for (var i = ids.length - 1; i >= 0; i--) {
        var el = document.getElementById(ids[i]);
        if (el && el.offsetTop <= scrollY) {
          setActiveSection(ids[i]);
          break;
        }
      }
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return function () { window.removeEventListener('scroll', onScroll); };
  }, []);

  /* Close menu on scroll */
  React.useEffect(function () {
    if (menuOpen) { document.body.style.overflow = 'hidden'; }
    else { document.body.style.overflow = ''; }
  }, [menuOpen]);

  var openLightbox = function (images, index) {
    setLbImages(images);
    setLbIndex(index);
  };

  var navLightbox = function (dir) {
    setLbIndex(function (prev) {
      var next = prev + dir;
      if (next < 0) return lbImages.length - 1;
      if (next >= lbImages.length) return 0;
      return next;
    });
  };

  var closeLightbox = function () { setLbIndex(-1); };
  var toggleMenu = function () { setMenuOpen(function (p) { return !p; }); };
  var closeMenu = function () { setMenuOpen(false); };

  return (
    <>
      <NavBar activeSection={activeSection} onMenuToggle={toggleMenu} menuOpen={menuOpen} />
      <MenuOverlay open={menuOpen} activeSection={activeSection} onClose={closeMenu} />

      <main>
        <HeroSection />
        <AboutSection />
        <PhotoSection onImageClick={openLightbox} />
        <VideoSection />
        <FnbSection onImageClick={openLightbox} />
        <SocialSection onImageClick={openLightbox} />
        <ContactSection />
      </main>

      <Footer />

      {lbIndex >= 0 && (
        <Lightbox images={lbImages} currentIndex={lbIndex} onClose={closeLightbox} onNav={navLightbox} />
      )}

      <TweaksPanel>
        <TweakSection label="Theme" />
        <TweakColor label="Accent" value={t.accentColor}
          options={['#0071E3', '#882FF4', '#0A861A', '#CC29BC']}
          onChange={function (v) { setTweak('accentColor', v); }} />
        <TweakSection label="Layout" />
        <TweakRadio label="Corners" value={t.cardRadius}
          options={[{ value: '4', label: 'Sharp' }, { value: '16', label: 'Rounded' }, { value: '28', label: 'Soft' }]}
          onChange={function (v) { setTweak('cardRadius', v); }} />
        <TweakRadio label="Density" value={t.gridGap}
          options={[{ value: '8', label: 'Tight' }, { value: '16', label: 'Normal' }, { value: '24', label: 'Airy' }]}
          onChange={function (v) { setTweak('gridGap', v); }} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
