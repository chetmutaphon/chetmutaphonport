<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chet Mutaphon — Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    /* ===== RESET & ROOT ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    :root {
      --font-body: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      --font-heading: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      --heading-weight: 700;
      --bg: #ffffff;
      --bg-alt: #f5f5f7;
      --text: #1d1d1f;
      --text-secondary: #86868b;
      --accent: #1d1d1f;
      --border: #d2d2d7;
      --card: #f5f5f7;
      --nav-bg: rgba(255,255,255,0.72);
      --radius: 18px;
      --hero-size: clamp(48px, 8vw, 88px);
      --hero-align: center;
      --hero-items: center;
      --section-gap: 120px;
      --gallery-cols: 3;
    }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      transition: background 0.5s ease, color 0.5s ease;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ===== SCROLL PROGRESS ===== */
    .scroll-progress {
      position: fixed; top: 0; left: 0; z-index: 1002;
      height: 2px; background: var(--accent);
      transition: width 0.05s linear, background 0.5s ease;
    }

    /* ===== NAVIGATION ===== */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      height: 56px; display: flex; align-items: center;
      justify-content: space-between; padding: 0 48px;
      background: transparent;
      border-bottom: 1px solid transparent;
      transition: all 0.35s ease;
      font-family: var(--font-body);
    }
    .nav--scrolled {
      background: var(--nav-bg);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom-color: var(--border);
    }
    .nav-logo {
      font-family: var(--font-heading); font-weight: var(--heading-weight);
      font-size: 17px; color: var(--text); cursor: pointer;
      letter-spacing: -0.02em; text-decoration: none;
      transition: color 0.5s ease;
    }
    .nav-links { display: flex; gap: 32px; }
    .nav-link {
      font-size: 14px; color: var(--text-secondary); cursor: pointer;
      text-decoration: none; font-weight: 400; letter-spacing: 0.01em;
      transition: color 0.25s ease; position: relative;
    }
    .nav-link:hover { color: var(--text); }
    .nav-link--active { color: var(--text); font-weight: 600; }
    .nav-link--active::after {
      content: ''; position: absolute; bottom: -4px; left: 0; right: 0;
      height: 1.5px; background: var(--accent); border-radius: 1px;
    }

    /* ===== HERO ===== */
    .hero {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: var(--hero-items, center); justify-content: center;
      padding: 80px 48px 40px;
      position: relative;
    }
    .hero-content {
      text-align: var(--hero-align, center);
      max-width: 900px;
    }
    .hero-name {
      font-family: var(--font-heading); font-weight: var(--heading-weight);
      font-size: var(--hero-size); letter-spacing: -0.04em;
      line-height: 1.05; color: var(--text);
      transition: font-family 0.3s, color 0.5s ease;
    }
    .hero-title {
      font-size: clamp(16px, 2vw, 22px); color: var(--text-secondary);
      margin-top: 16px; font-weight: 400; letter-spacing: -0.01em;
      transition: color 0.5s ease;
    }
    .hero-tagline {
      font-size: clamp(14px, 1.4vw, 17px); color: var(--text-secondary);
      margin-top: 12px; opacity: 0.7; max-width: 500px;
      line-height: 1.6;
      transition: color 0.5s ease;
    }
    .hero[style] .hero-tagline {
      margin-left: var(--hero-align) == 'center' ? auto : 0;
      margin-right: auto;
    }

    /* Scroll hint */
    .scroll-hint {
      position: absolute; bottom: 32px;
      left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .scroll-hint-line {
      width: 1px; height: 48px; position: relative; overflow: hidden;
      background: var(--border);
    }
    .scroll-hint-line::after {
      content: ''; position: absolute; top: -48px; left: 0;
      width: 1px; height: 48px; background: var(--accent);
      animation: scrollLine 2s ease-in-out infinite;
    }
    @keyframes scrollLine {
      0% { transform: translateY(0); }
      100% { transform: translateY(96px); }
    }

    /* ===== SECTIONS ===== */
    .section {
      padding: var(--section-gap) 0;
      transition: padding 0.5s ease, background 0.5s ease;
    }
    .section--alt { background: var(--bg-alt); }
    .section-inner {
      max-width: 1120px; margin: 0 auto; padding: 0 48px;
    }
    .section-label {
      font-size: 13px; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--accent); margin-bottom: 12px; font-weight: 600;
      transition: color 0.5s ease;
    }
    .section-title {
      font-family: var(--font-heading); font-weight: var(--heading-weight);
      font-size: clamp(32px, 4vw, 52px); letter-spacing: -0.03em;
      line-height: 1.15; color: var(--text); margin-bottom: 48px;
      transition: font-family 0.3s, color 0.5s ease;
      text-wrap: pretty;
    }

    /* ===== ABOUT ===== */
    .about-text {
      font-size: 18px; line-height: 1.75; color: var(--text-secondary);
      max-width: 680px; margin-bottom: 48px;
      text-wrap: pretty; transition: color 0.5s ease;
    }
    .skills-grid {
      display: flex; flex-wrap: wrap; gap: 10px;
    }
    .skill-tag {
      padding: 8px 20px; border-radius: 100px;
      font-size: 14px; font-weight: 500;
      border: 1px solid var(--border); color: var(--text);
      background: var(--bg);
      transition: all 0.3s ease;
      cursor: default;
    }
    .skill-tag:hover {
      background: var(--text); color: var(--bg);
      border-color: var(--text);
    }

    /* ===== TIMELINE ===== */
    .timeline { position: relative; padding-left: 40px; }
    .timeline::before {
      content: ''; position: absolute; left: 5px; top: 8px; bottom: 40px;
      width: 1.5px; background: var(--border); transition: background 0.5s ease;
    }
    .timeline-item {
      position: relative; padding-bottom: 40px;
    }
    .timeline-dot {
      position: absolute; left: -40px; top: 8px;
      width: 11px; height: 11px; border-radius: 50%;
      background: var(--bg); border: 2px solid var(--accent);
      z-index: 1; transition: all 0.5s ease;
    }
    .timeline-card {
      background: var(--card); border-radius: var(--radius);
      padding: 28px 32px; transition: all 0.5s ease;
    }
    .timeline-card:hover { transform: translateX(4px); }
    .timeline-header {
      display: flex; justify-content: space-between;
      align-items: baseline; flex-wrap: wrap; gap: 8px;
      margin-bottom: 4px;
    }
    .timeline-role {
      font-family: var(--font-heading); font-weight: var(--heading-weight);
      font-size: 18px; color: var(--text); transition: color 0.5s ease;
    }
    .timeline-period {
      font-size: 13px; color: var(--text-secondary); font-weight: 500;
      letter-spacing: 0.02em; transition: color 0.5s ease;
    }
    .timeline-company {
      font-size: 14px; color: var(--accent); margin-bottom: 10px;
      font-weight: 500; transition: color 0.5s ease;
    }
    .timeline-desc {
      font-size: 15px; line-height: 1.65; color: var(--text-secondary);
      transition: color 0.5s ease;
    }

    /* ===== FILTER TABS ===== */
    .filter-tabs {
      display: flex; gap: 8px; margin-bottom: 36px; flex-wrap: wrap;
    }
    .filter-tab {
      padding: 8px 20px; border-radius: 100px; font-size: 14px;
      font-family: var(--font-body); font-weight: 500;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-secondary); cursor: pointer;
      transition: all 0.25s ease;
    }
    .filter-tab:hover { color: var(--text); border-color: var(--text-secondary); }
    .filter-tab--active {
      background: var(--text); color: var(--bg);
      border-color: var(--text);
    }

    /* ===== GALLERY GRID ===== */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(var(--gallery-cols, 3), 1fr);
      gap: 20px;
    }
    .gallery-card {
      position: relative; border-radius: var(--radius);
      overflow: hidden; cursor: pointer;
      transition: transform 0.4s ease, box-shadow 0.4s ease, border-radius 0.5s ease;
    }
    .gallery-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.08);
    }
    .gallery-placeholder {
      aspect-ratio: 4/3; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
    }
    .placeholder-label {
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
      font-size: 11px; letter-spacing: 0.15em; color: var(--text-secondary);
      font-weight: 500; transition: color 0.5s ease;
    }
    .placeholder-hint {
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
      font-size: 10px; color: var(--text-secondary); opacity: 0.5;
      transition: color 0.5s ease;
    }
    .gallery-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0);
      display: flex; align-items: flex-end; padding: 20px;
      transition: background 0.35s ease;
    }
    .gallery-card:hover .gallery-overlay { background: rgba(0,0,0,0.5); }
    .gallery-overlay-title {
      color: #fff; font-weight: 600; font-size: 15px;
      opacity: 0; transform: translateY(8px);
      transition: all 0.35s ease;
    }
    .gallery-card:hover .gallery-overlay-title {
      opacity: 1; transform: translateY(0);
    }

    /* ===== VIDEO GRID ===== */
    .video-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px;
    }
    .video-card {
      cursor: pointer; border-radius: var(--radius);
      overflow: hidden; background: var(--card);
      transition: all 0.4s ease;
    }
    .video-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.08);
    }
    .video-thumb {
      aspect-ratio: 16/9; background: var(--bg-alt);
      display: flex; align-items: center; justify-content: center;
      position: relative;
      background: repeating-linear-gradient(-45deg, transparent, transparent 12px, rgba(0,0,0,0.03) 12px, rgba(0,0,0,0.03) 24px), var(--card);
      transition: background 0.5s ease;
    }
    .video-play {
      color: var(--text); opacity: 0.3;
      transition: all 0.35s ease;
    }
    .video-card:hover .video-play { opacity: 0.8; transform: scale(1.08); }
    .video-info { padding: 16px 20px; }
    .video-title {
      font-family: var(--font-heading); font-weight: 600;
      font-size: 15px; color: var(--text); margin-bottom: 4px;
      transition: color 0.5s ease;
    }
    .video-desc {
      font-size: 13px; color: var(--text-secondary);
      transition: color 0.5s ease;
    }

    /* ===== MODALS ===== */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.3s ease; cursor: zoom-out;
      padding: 48px;
    }
    .modal-overlay--dark { background: rgba(0,0,0,0.95); }
    .modal-close {
      position: fixed; top: 20px; right: 24px;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.1); border: none;
      color: #fff; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s ease; z-index: 2001;
    }
    .modal-close:hover { background: rgba(255,255,255,0.2); }
    .modal-content {
      animation: scaleIn 0.3s ease;
      cursor: default;
    }

    /* Lightbox */
    .lightbox-content { max-width: 800px; width: 100%; }
    .lightbox-image {
      aspect-ratio: 4/3; border-radius: 12px; overflow: hidden;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 8px;
    }
    .lightbox-info {
      padding: 20px 0; display: flex; justify-content: space-between;
      align-items: baseline;
    }
    .lightbox-title {
      color: #fff; font-family: var(--font-heading);
      font-weight: var(--heading-weight); font-size: 20px;
    }
    .lightbox-cat {
      color: rgba(255,255,255,0.5); font-size: 13px;
      text-transform: uppercase; letter-spacing: 0.1em;
    }

    /* Video modal */
    .video-modal {
      width: 100%; max-width: 960px; cursor: default;
      animation: scaleIn 0.3s ease;
    }
    .video-embed {
      aspect-ratio: 16/9; border-radius: 12px; overflow: hidden;
      background: #000;
    }
    .video-modal-title {
      color: rgba(255,255,255,0.7); font-size: 14px;
      margin-top: 16px; text-align: center;
    }

    /* ===== FOOTER ===== */
    .footer {
      padding: 60px 0; border-top: 1px solid var(--border);
      transition: border-color 0.5s ease;
    }
    .footer-inner {
      max-width: 1120px; margin: 0 auto; padding: 0 48px;
      display: flex; justify-content: space-between;
      align-items: center; flex-wrap: wrap; gap: 24px;
    }
    .footer-left { display: flex; flex-direction: column; gap: 4px; }
    .footer-name {
      font-family: var(--font-heading); font-weight: var(--heading-weight);
      font-size: 16px; color: var(--text); transition: color 0.5s ease;
    }
    .footer-copy {
      font-size: 13px; color: var(--text-secondary);
      transition: color 0.5s ease;
    }
    .footer-contact { display: flex; gap: 32px; flex-wrap: wrap; }
    .footer-link {
      font-size: 14px; color: var(--text-secondary);
      text-decoration: none; transition: color 0.25s ease;
      display: inline-flex; align-items: center;
    }
    .footer-link:hover { color: var(--accent); }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .nav { padding: 0 24px; }
      .nav-links { gap: 20px; }
      .hero { padding: 80px 24px 40px; }
      .section-inner { padding: 0 24px; }
      .gallery-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 12px; }
      .video-grid { grid-template-columns: 1fr; }
      .timeline { padding-left: 28px; }
      .timeline-dot { left: -28px; }
      .timeline-card { padding: 20px; }
      .footer-inner { padding: 0 24px; }
    }
    @media (max-width: 480px) {
      .gallery-grid { grid-template-columns: 1fr !important; }
      .nav-links { display: none; }
    }
  </style>

  <script>
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "appleMinimal",
      "galleryCols": "4",
      "spacing": "normal"
    }/*EDITMODE-END*/;
    window.TWEAK_DEFAULTS = TWEAK_DEFAULTS;
  </script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="portfolio-utils.jsx"></script>
  <script type="text/babel" src="portfolio-sections.jsx"></script>
  <script type="text/babel" src="portfolio-app.jsx"></script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
